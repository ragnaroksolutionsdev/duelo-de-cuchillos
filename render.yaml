services:
  - type: web
    name: duelo-de-cuchillos-server
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false   # set in Render dashboard
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
